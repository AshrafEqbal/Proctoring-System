<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Join Exam — ProctorVault</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<style>
:root{--bg0:#07090f;--bg1:#0d1117;--bg2:#141924;--bg3:#1c2333;--border:#2a3550;--text0:#f0f4ff;--text1:#c8d3f0;--text2:#7b8db8;--text3:#4a5578;--accent:#4f8ef7;--accent2:#2563eb;--green:#22d3a0;--red:#f05a5a;--font:'DM Sans',sans-serif;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg0);color:var(--text1);min-height:100vh;display:grid;place-items:center;padding:20px;}
.bg-dots{position:fixed;inset:0;background-image:radial-gradient(circle,rgba(79,142,247,.15) 1px,transparent 1px);background-size:30px 30px;pointer-events:none;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:40px;width:480px;max-width:100%;z-index:1;position:relative;box-shadow:0 30px 80px rgba(0,0,0,.5);animation:rise .4s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes rise{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:none}}
.logo{text-align:center;margin-bottom:28px;}
.logo-icon{width:52px;height:52px;border-radius:14px;margin:0 auto 12px;background:linear-gradient(135deg,var(--accent2),#059669);display:flex;align-items:center;justify-content:center;font-size:24px;}
.logo h1{font-family:'Space Mono',monospace;font-size:1.25rem;font-weight:700;color:var(--text0);}
.logo p{font-size:.8rem;color:var(--text3);margin-top:4px;}
.divider{border:none;border-top:1px solid var(--border);margin:22px 0;}
.form-label{display:block;font-size:.78rem;font-weight:600;color:var(--text2);margin-bottom:6px;letter-spacing:.04em;text-transform:uppercase;}
.form-input{width:100%;background:var(--bg1);border:1px solid var(--border);color:var(--text0);padding:11px 14px;border-radius:10px;font-size:.9rem;font-family:var(--font);outline:none;transition:border .2s,box-shadow .2s;margin-bottom:14px;}
.form-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,142,247,.15);}
.code-input{font-family:'Space Mono',monospace;font-size:1.3rem;text-align:center;letter-spacing:.2em;text-transform:uppercase;}
.btn{width:100%;background:linear-gradient(135deg,var(--accent2),#059669);color:#fff;border:none;padding:12px;border-radius:10px;font-size:.95rem;font-weight:700;cursor:pointer;transition:opacity .2s,transform .15s;font-family:var(--font);}
.btn:hover{opacity:.9;} .btn:active{transform:scale(.98);}
.error{background:rgba(240,90,90,.1);color:var(--red);border:1px solid rgba(240,90,90,.25);padding:10px 14px;border-radius:8px;font-size:.82rem;margin-bottom:14px;}
.hint{text-align:center;margin-top:20px;font-size:.8rem;color:var(--text3);}
.hint a{color:var(--accent);}
.checklist{margin-bottom:20px;display:flex;flex-direction:column;gap:8px;}
.check-item{display:flex;align-items:center;gap:10px;font-size:.82rem;color:var(--text2);background:var(--bg3);padding:10px 14px;border-radius:8px;border:1px solid var(--border);}
.check-item .ci-icon{font-size:1rem;}
</style>
</head>
<body>
<div class="bg-dots"></div>
<div class="card">
  <div class="logo">
    <div class="logo-icon">📝</div>
    <h1>ProctorVault</h1>
    <p>Enter your exam code to begin</p>
  </div>
  <div class="checklist">
    <div class="check-item"><span class="ci-icon">📷</span> Camera & microphone required</div>
    <div class="check-item"><span class="ci-icon">🔒</span> Monitored by AI proctoring system</div>
    <div class="check-item"><span class="ci-icon">⚠️</span> Violations may pause or lock your exam</div>
  </div>
  <hr class="divider">
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="POST">
    <label class="form-label">Exam Code</label>
    <input class="form-input code-input" type="text" name="code" placeholder="XXXXX" maxlength="10" required autofocus>
    <label class="form-label">Full Name</label>
    <input class="form-input" type="text" name="name" placeholder="Your full name" required>
    <label class="form-label">Email Address</label>
    <input class="form-input" type="email" name="email" placeholder="you@example.com" required>
    <button class="btn" type="submit">Continue to System Check →</button>
  </form>
  <div class="hint">Staff login? <a href="/login">Sign in here →</a></div>
</div>
</body>
</html>
