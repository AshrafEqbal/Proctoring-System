<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{% block title %}ProctorVault{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
<style>
:root {
  --bg0:     #07090f;
  --bg1:     #0d1117;
  --bg2:     #141924;
  --bg3:     #1c2333;
  --bg4:     #242d42;
  --border:  #2a3550;
  --border2: #364060;
  --text0:   #f0f4ff;
  --text1:   #c8d3f0;
  --text2:   #7b8db8;
  --text3:   #4a5578;
  --accent:  #4f8ef7;
  --accent2: #2563eb;
  --green:   #22d3a0;
  --green2:  #16a37a;
  --red:     #f05a5a;
  --red2:    #c93030;
  --amber:   #f0a030;
  --amber2:  #c07818;
  --purple:  #a78bfa;
  --radius:  10px;
  --radius2: 14px;
  --shadow:  0 4px 24px rgba(0,0,0,.5);
  --font:    'DM Sans', sans-serif;
  --mono:    'Space Mono', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font); background: var(--bg0); color: var(--text1);
  min-height: 100vh; font-size: 15px; line-height: 1.6; overflow-x: hidden;
}
a { color: var(--accent); text-decoration: none; }
a:hover { color: var(--text0); }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg1); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* ── Layout shells ── */
.app-shell { display: flex; min-height: 100vh; }
.sidebar {
  width: 220px; min-width: 200px; background: var(--bg1);
  border-right: 1px solid var(--border); display: flex; flex-direction: column;
  position: sticky; top: 0; height: 100vh; overflow-y: auto;
}
.sidebar-logo {
  padding: 22px 20px 14px;
  display: flex; align-items: center; gap: 10px;
  border-bottom: 1px solid var(--border);
}
.sidebar-logo .logo-mark {
  width: 32px; height: 32px; border-radius: 8px;
  background: linear-gradient(135deg, var(--accent), var(--purple));
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}
.sidebar-logo span { font-size: .95rem; font-weight: 700; color: var(--text0); letter-spacing: -.01em; }
.sidebar-logo sub  { font-size: .6rem; color: var(--text3); display: block; letter-spacing: .08em; text-transform: uppercase; }
.nav-section { padding: 10px 0; }
.nav-label   { padding: 6px 18px 4px; font-size: .65rem; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .08em; }
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 18px; font-size: .85rem; color: var(--text2);
  cursor: pointer; transition: all .15s; border-left: 2px solid transparent;
  text-decoration: none;
}
.nav-item:hover   { background: var(--bg2); color: var(--text1); }
.nav-item.active  { background: rgba(79,142,247,.1); color: var(--accent); border-left-color: var(--accent); }
.nav-item .icon   { font-size: 1rem; width: 18px; text-align: center; }
.sidebar-footer   { margin-top: auto; padding: 14px 18px; border-top: 1px solid var(--border); }
.sidebar-user     { display: flex; align-items: center; gap: 10px; }
.sidebar-user .av {
  width: 30px; height: 30px; border-radius: 50%; background: var(--bg4);
  display: flex; align-items: center; justify-content: center;
  font-size: .75rem; font-weight: 700; color: var(--accent); flex-shrink: 0;
}
.sidebar-user .info .name { font-size: .8rem; font-weight: 600; color: var(--text1); }
.sidebar-user .info .role { font-size: .68rem; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; }

/* ── Main area ── */
.main-area { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: auto; }
.topbar {
  background: var(--bg1); border-bottom: 1px solid var(--border);
  padding: 14px 28px; display: flex; align-items: center; justify-content: space-between;
  gap: 12px; position: sticky; top: 0; z-index: 40;
}
.topbar h2 { font-size: 1.1rem; font-weight: 600; color: var(--text0); }
.topbar .breadcrumb { font-size: .78rem; color: var(--text3); }
.page-content { padding: 28px; flex: 1; }

/* ── Cards ── */
.card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius2); padding: 20px;
}
.card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.card-title  { font-size: .9rem; font-weight: 600; color: var(--text0); }
.card-sub    { font-size: .75rem; color: var(--text3); margin-top: 1px; }

/* ── Buttons ── */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px; border: none; border-radius: var(--radius);
  font-size: .82rem; font-weight: 600; cursor: pointer;
  transition: all .15s; font-family: var(--font); line-height: 1;
  white-space: nowrap;
}
.btn:active { transform: scale(.97); }
.btn-primary   { background: var(--accent2); color: #fff; }
.btn-primary:hover   { background: var(--accent); color: #fff; }
.btn-success   { background: var(--green2); color: #fff; }
.btn-success:hover   { background: var(--green); color: var(--bg0); }
.btn-danger    { background: var(--red2); color: #fff; }
.btn-danger:hover    { background: var(--red); color: #fff; }
.btn-warning   { background: var(--amber2); color: #fff; }
.btn-ghost     { background: var(--bg3); color: var(--text2); border: 1px solid var(--border); }
.btn-ghost:hover     { background: var(--bg4); color: var(--text0); }
.btn-sm { padding: 5px 10px; font-size: .75rem; }
.btn-lg { padding: 11px 22px; font-size: .95rem; }

/* ── Badges ── */
.badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 9px; border-radius: 999px; font-size: .68rem; font-weight: 600;
  white-space: nowrap; letter-spacing: .03em;
}
.badge-green   { background: rgba(34,211,160,.12); color: var(--green); border: 1px solid rgba(34,211,160,.25); }
.badge-red     { background: rgba(240,90,90,.12);  color: var(--red);   border: 1px solid rgba(240,90,90,.25); }
.badge-amber   { background: rgba(240,160,48,.12); color: var(--amber); border: 1px solid rgba(240,160,48,.25); }
.badge-blue    { background: rgba(79,142,247,.12); color: var(--accent);border: 1px solid rgba(79,142,247,.25); }
.badge-gray    { background: var(--bg4); color: var(--text3); border: 1px solid var(--border); }
.live-dot      { width: 6px; height: 6px; border-radius: 50%; background: currentColor; animation: blink 1.2s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

/* ── Forms ── */
.form-group  { margin-bottom: 16px; }
.form-label  { display: block; font-size: .8rem; font-weight: 500; color: var(--text2); margin-bottom: 6px; }
.form-input, .form-select, .form-textarea {
  width: 100%; background: var(--bg1); border: 1px solid var(--border);
  color: var(--text0); padding: 9px 12px; border-radius: var(--radius);
  font-size: .88rem; font-family: var(--font); outline: none; transition: border .2s;
}
.form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--accent); }
.form-textarea { resize: vertical; min-height: 80px; }
.form-select option { background: var(--bg2); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

/* ── Tables ── */
.table-wrap { overflow-x: auto; border-radius: var(--radius); }
table { width: 100%; border-collapse: collapse; min-width: 600px; }
thead th {
  background: var(--bg3); padding: 10px 14px; font-size: .7rem; font-weight: 600;
  color: var(--text3); text-transform: uppercase; letter-spacing: .06em;
  text-align: left; border-bottom: 1px solid var(--border); white-space: nowrap;
}
tbody td { padding: 10px 14px; font-size: .82rem; border-bottom: 1px solid var(--border); color: var(--text1); }
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover td { background: var(--bg3); }

/* ── Stats ── */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(180px,1fr)); gap: 14px; margin-bottom: 24px; }
.stat-card {
  background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius2);
  padding: 18px; position: relative; overflow: hidden;
}
.stat-card::before { content:''; position:absolute; top:0;right:0; width:60px; height:60px; border-radius:50%; opacity:.06; }
.stat-card.s-blue::before  { background:var(--accent); }
.stat-card.s-green::before { background:var(--green); }
.stat-card.s-red::before   { background:var(--red); }
.stat-card.s-amber::before { background:var(--amber); }
.stat-label { font-size: .7rem; color: var(--text3); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 8px; }
.stat-value { font-size: 1.9rem; font-weight: 700; color: var(--text0); line-height: 1; }
.stat-sub   { font-size: .72rem; color: var(--text3); margin-top: 4px; }

/* ── Progress bars ── */
.prog-track { height: 6px; background: var(--bg4); border-radius: 3px; overflow: hidden; margin-top: 6px; }
.prog-fill  { height: 100%; border-radius: 3px; transition: width .5s ease, background .4s; }

/* ── Alerts / toasts ── */
.alert { padding: 12px 16px; border-radius: var(--radius); font-size: .85rem; margin-bottom: 16px; }
.alert-error   { background: rgba(240,90,90,.1); color: var(--red);   border: 1px solid rgba(240,90,90,.25); }
.alert-success { background: rgba(34,211,160,.1); color: var(--green); border: 1px solid rgba(34,211,160,.25); }
.alert-info    { background: rgba(79,142,247,.1); color: var(--accent);border: 1px solid rgba(79,142,247,.25); }

#toast {
  position: fixed; bottom: 24px; right: 24px; z-index: 999;
  background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 12px 18px; font-size: .83rem; color: var(--text1);
  box-shadow: var(--shadow); max-width: 320px;
  transform: translateY(60px); opacity: 0; pointer-events: none;
  transition: all .25s cubic-bezier(.34,1.56,.64,1);
}
#toast.show { transform: translateY(0); opacity: 1; }

/* ── Modal ── */
.modal-bg {
  position: fixed; inset: 0; background: rgba(0,0,0,.7); backdrop-filter: blur(4px);
  z-index: 500; display: none; align-items: center; justify-content: center; padding: 20px;
}
.modal-bg.open { display: flex; }
.modal {
  background: var(--bg2); border: 1px solid var(--border2);
  border-radius: var(--radius2); padding: 28px; width: 440px; max-width: 100%;
  box-shadow: var(--shadow); animation: popIn .2s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn { from{opacity:0;transform:scale(.92)} to{opacity:1;transform:scale(1)} }
.modal h3 { font-size: 1.1rem; margin-bottom: 6px; color: var(--text0); }
.modal p  { font-size: .85rem; color: var(--text2); margin-bottom: 20px; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

/* ── Responsive ── */
@media(max-width:900px) {
  .sidebar { display: none; }
  .form-row { grid-template-columns: 1fr; }
  .stats-grid { grid-template-columns: 1fr 1fr; }
}
</style>
{% block head %}{% endblock %}
</head>
<body>
{% block body %}{% endblock %}

<div id="toast"></div>

<script>
function toast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = type ? `show ${type}` : 'show';
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 3200);
}
function initials(name) {
  return (name||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
}
function scoreColor(v) {
  return v > 60 ? 'var(--green)' : v > 35 ? 'var(--amber)' : 'var(--red)';
}
function susColor(v) {
  return v < 40 ? 'var(--green)' : v < 70 ? 'var(--amber)' : 'var(--red)';
}
</script>
{% block scripts %}{% endblock %}
</body>
</html>
